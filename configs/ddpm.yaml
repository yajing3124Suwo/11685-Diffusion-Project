# CIFAR-10 (32x32) — data from https://www.cs.toronto.edu/~kriz/cifar.html via torchvision
dataset: cifar10
cifar_download: true
data_dir: ./data
image_size: 32
batch_size: 64
num_workers: 4
num_classes: 10

num_epochs: 10
learning_rate: 0.0002
weight_decay: 0.0
grad_clip: 1.0
seed: 42
use_wandb: false

num_train_timesteps: 1000
num_inference_steps: 200
beta_start: 0.0001
beta_end: 0.02
beta_schedule: linear
variance_type: fixed_small
prediction_type: epsilon
clip_sample: true
clip_sample_range: 1.0

unet_in_size: 32
unet_in_ch: 3
unet_ch: 128
unet_ch_mult: [1, 2, 2, 2]
unet_attn: []
unet_num_res_blocks: 2
unet_dropout: 0.1

latent_ddpm: false
use_cfg: false
cfg_guidance_scale: 2.0
use_ddim: false
